<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modifier une annonce</title>

    <link rel="stylesheet" href="style.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f5f7fb;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .modifier-container {
        width: 420px;
        background: white;
        padding: 35px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }

      .modifier-container h2 {
        text-align: center;
        color: #2563eb;
        margin-bottom: 25px;
      }

      .modifier-container label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #444;
      }

      .modifier-container input {
        width: 100%;
        padding: 12px;
        margin-bottom: 18px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 16px;
      }

      .modifier-container input[type="file"] {
        background: white;
        padding: 10px;
      }

      #btnModifier {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 8px;
        background: #2563eb;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
      }

      #btnModifier:hover {
        background: #1d4ed8;
      }

      @media (max-width: 768px) {
        .modifier-container {
          width: 90%;
          padding: 25px;
        }
      }
    </style>
  </head>
  <body>
    <
    <div class="modifier-container">
      <h2>Modifier une annonce</h2>

      <label>Nom</label>
      <input type="text" id="nom" />

      <label>Prix</label>
      <input type="number" id="prix" />

      <label>Image</label>
      <input type="file" id="image" accept="image/*" />

      <button id="btnModifier">Enregistrer les modifications</button>
    </div>

    <script type="module" src="modifier.js"></script>
  </body>
</html>
